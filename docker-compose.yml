version: '3.8'

services:
  api-gateway:
    image: ghcr.io/andesworkforce/api_gateway:latest
    networks:
      - traefik-public              # <-- Nombre exacto de la captura
      - nats_nats_internal_network  # <-- Nombre exacto de la captura
      - default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels: 
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public" 
        - "traefik.http.routers.api-gateway.rule=Host(`api.www.pulse-aw.com`)"
        - "traefik.http.routers.api-gateway.entrypoints=websecure"
        - "traefik.http.routers.api-gateway.tls=true"
        - "traefik.http.routers.api-gateway.tls.certresolver=letsencrypt"
        - "traefik.http.services.api-gateway.loadbalancer.server.port=3001" 
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      # Límites PROD (tabla interna: API NestJS)
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M
    environment:
      NODE_ENV: production
      PORT: "${PORT:-3001}"

      # NATS
      NATS_HOST: nats-prod
      NATS_PORT: "4222"
      NATS_USERNAME: "${NATS_USERNAME}"
      NATS_PASSWORD: "${NATS_PASSWORD}"

      ENVIRONMENT: "${ENVIRONMENT:-production}"
      DEV_LOGS: "${DEV_LOGS:-false}"

      THROTTLE_TTL: "${THROTTLE_TTL:-60000}"
      THROTTLE_LIMIT: "${THROTTLE_LIMIT:-100}"
      THROTTLE_AUTH_LOGIN_TTL: "${THROTTLE_AUTH_LOGIN_TTL:-60000}"
      THROTTLE_AUTH_LOGIN_LIMIT: "${THROTTLE_AUTH_LOGIN_LIMIT:-5}"
      THROTTLE_AUTH_REGISTER_TTL: "${THROTTLE_AUTH_REGISTER_TTL:-300000}"
      THROTTLE_AUTH_REGISTER_LIMIT: "${THROTTLE_AUTH_REGISTER_LIMIT:-20}"
      THROTTLE_AUTH_REFRESH_TTL: "${THROTTLE_AUTH_REFRESH_TTL:-60000}"
      THROTTLE_AUTH_REFRESH_LIMIT: "${THROTTLE_AUTH_REFRESH_LIMIT:-10}"
      THROTTLE_AGENT_HEARTBEAT_TTL: "${THROTTLE_AGENT_HEARTBEAT_TTL:-60000}"
      THROTTLE_AGENT_HEARTBEAT_LIMIT: "${THROTTLE_AGENT_HEARTBEAT_LIMIT:-30}"
      THROTTLE_AGENT_REGISTER_TTL: "${THROTTLE_AGENT_REGISTER_TTL:-60000}"
      THROTTLE_AGENT_REGISTER_LIMIT: "${THROTTLE_AGENT_REGISTER_LIMIT:-100}"

      CORS_ORIGINS: "https://www.pulse-aw.com,https://pulse-aw.com"

networks:
  default:
    name: andes-api-gateway-net
    driver: overlay
    
  traefik-public:
    external: true
    
  nats_nats_internal_network:
    external: true