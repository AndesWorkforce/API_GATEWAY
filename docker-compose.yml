# docker-compose.yml — Local development & validation only
# For production use a Kubernetes deployment manifest.
#
# Usage:
#   1. Copy .env.template to .env and fill in your values
#   2. docker compose up --build

services:
  # ─── NATS message broker ────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: andes-nats
    restart: unless-stopped
    command:
      - "--user"
      - "${NATS_USERNAME:-andes_nats}"
      - "--pass"
      - "${NATS_PASSWORD:-andesworkforce_nats}"
      - "--port"
      - "4222"
      - "-m"
      - "8222" # enable HTTP monitoring endpoint
    ports:
      - "4222:4222" # client connections
      - "8222:8222" # HTTP monitoring (optional)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API Gateway ────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: andes-api-gateway
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      # Override NATS_HOST so el contenedor use el servicio interno "nats"
      # en lugar de la IP externa del .env
      NATS_HOST: "nats"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
